<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>You're offline</title>
<style>
    body {
        margin: 0; min-height: 100vh; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 1rem;
        background: #15171c; color: #e4e6eb; font-family: system-ui, sans-serif; text-align: center; padding: 1.5rem;
    }
    img { width: 4rem; height: 4rem; border-radius: 50%; }
    h1 { font-size: 1.25rem; margin: 0; }
    p { color: #9aa0ab; margin: 0; max-width: 24rem; }
    button {
        margin-top: 0.5rem; padding: 0.5rem 1rem; border-radius: 6px; border: none;
        background: #2f6fed; color: #fff; cursor: pointer; font-size: 0.9rem;
    }
</style>
</head>
<body>
    <img src="/assets/images/icon-circle.png" alt="">
    <h1>You're offline</h1>
    <p>This page isn't available right now — check your connection and try again.</p>
    <button onclick="window.location.reload()">Retry</button>
</body>
</html>
